name: eticket_helpdesk
description: "E-Ticketing Helpdesk Mobile App"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1        
  go_router: ^14.0.0         
  provider: ^6.1.2
  fl_chart: ^0.69.0  
  supabase_flutter: ^2.0.0
  image_picker: ^1.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1
flutter_launcher_icons:                     
  android: true
  ios: true
  image_path_android: "assets/logo/help_desk_icon.png"
  image_path_ios: "assets/logo/help_desk_icon.png"
  remove_alpha_ios: true

flutter:
  uses-material-design: true
  assets:
    - assets/logo/